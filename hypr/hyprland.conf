monitor=,1920x1080@144,auto,1

env = XCURSOR_SIZE,20

cursor {
    no_hardware_cursors = false
}

# =========================
# AUTOSTART
# =========================

exec-once = qs -c noctalia-shell
exec-once = hyprpaper -n
exec-once = ~/.config/hypr/xdg-portal-hyprland
exec-once = mpd &
exec = swayidle -w timeout 600 'hyprlock'
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets

# =========================
# INPUT
# =========================

input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    accel_profile = flat
    follow_mouse = 1
    sensitivity = 0.3

    touchpad {
        natural_scroll = yes
        scroll_factor = 0.1
        disable_while_typing = true
    }
}

# =========================
# GENERAL
# =========================

general {
    gaps_in = 2
    gaps_out = 6
    border_size = 1

    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

# =========================
# DECORATION
# =========================

decoration {
    rounding = 8
    inactive_opacity = .85
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
    }
}

# =========================
# ANIMATIONS
# =========================

animations {
    enabled = yes

    bezier = myBezier, 0.10, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier, slide
    animation = windowsOut, 1, 7, myBezier, slide
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

# =========================
# DWINDLE
# =========================

dwindle {
#     pseudotile = no
    preserve_split = yes
}

# =========================
# TOUCHPAD GESTURES
# =========================

gestures {
    workspace_swipe_distance = 500
    workspace_swipe_forever = true
    workspace_swipe_direction_lock = true
    workspace_swipe_min_speed_to_force = 20
    workspace_swipe_invert = true
}

gesture = 3, horizontal, workspace
gesture = 4, down, fullscreen
gesture = 4, up, float

# =========================
# BINDS
# =========================

binds {
    workspace_back_and_forth = 1
    allow_workspace_cycles = 1
    pass_mouse_when_bound = 0
}

# =========================
# MISC
# =========================

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    vrr = 1
    enable_swallow = true
}

ecosystem {
    no_update_news = true
}

# =========================
# WINDOW RULES
# =========================

windowrule = match:class ^(kitty)$, workspace 1
windowrule = match:class ^(brave-browser)$, workspace 2
windowrule = match:title ^(Spotify).*, workspace 3
windowrule = match:class ^(org\.mozilla\.Thunderbird)$, workspace 4

# =========================
# MOD KEY
# =========================

$mainMod = SUPER

# =========================
# APPLICATION BINDS
# =========================

bind = $mainMod, RETURN, exec, kitty tmux new -As1

bind = $mainMod, W, exec, brave --enable-features=TouchpadOverscrollHistoryNavigation --disable-experiments
bind = $mainMod SHIFT, W, exec, brave --incognito --enable-features=TouchpadOverscrollHistoryNavigation --disable-experiments

bind = $mainMod, E, exec, pcmanfm
bind = $mainMod, D, exec, wofi

bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, V, togglefloating
bind = $mainMod, J, togglesplit
bind = $mainMod, C, killactive

bind = $mainMod, backspace, exec, wlogout
bind = $mainMod SHIFT, L, exec, hyprlock

bind = $mainMod, v, exec, qs -c noctalia-shell ipc call plugin:clipper toggle
bind = $mainMod SHIFT, J, exec, pkill -f "qs.*noctalia" ; qs -c noctalia-shell &

bind = $mainMod SHIFT, B, exec, killall hyprpaper ; hyprpaper &

# =========================
# SCREENSHOTS
# =========================

bind = $mainMod, P, exec, grim "$HOME/Pictures/Screenshots/"$(date '+%y%m%d_%H-%M-%S').png
bind = $mainMod SHIFT, P, exec, grim -g "$(slurp)" "$HOME/Pictures/Screenshots/"$(date '+%y%m%d_%H-%M-%S').png

# =========================
# WINDOW MOVEMENT
# =========================

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, h, movefocus, l
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u
bind = $mainMod, l, movefocus, r

# =========================
# RESIZE BINDS
# =========================

binde = $mainMod, Y, resizeactive, -50 0
binde = $mainMod, O, resizeactive, 50 0
binde = $mainMod, I, resizeactive, 0 -50
binde = $mainMod, U, resizeactive, 0 50

# =========================
# WORKSPACES
# =========================

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# =========================
# WORKSPACE SCROLLING
# =========================

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# =========================
# MOUSE BINDS
# =========================

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# =========================
# MEDIA / SYSTEM KEYS
# =========================

bind = $mainMod, F11, exec, playerctl play-pause

bind =, 211, exec, asusctl profile -n
bind =, Launch3, exec, alacritty

# =========================
# AUDIO
# =========================

bind =, XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 4%-
bind =, XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 4%+
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind =, XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# =========================
# BRIGHTNESS
# =========================

bind =, XF86MonBrightnessUp, exec, brightnessctl set +3%
bind =, XF86MonBrightnessDown, exec, brightnessctl set 3%-
